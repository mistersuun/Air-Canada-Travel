name: Update Flight Schedules

on:
  schedule:
    # Run every Monday at 6am UTC (AC typically updates schedules on weekends)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Fetch latest schedules
        run: python3 scripts/fetch-schedules.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/app/data/schedules.ts && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-schedules
          commit-message: "chore: update flight schedules from AC Vacations PDFs"
          title: "chore: flight schedule update"
          body: |
            Air Canada Vacations has updated their flight schedule PDFs.

            This PR was auto-generated by the weekly schedule sync workflow.

            **Review checklist:**
            - [ ] Spot-check a few routes against the [AC Vacations website](https://vacations.aircanada.com/en/plan-your-trip/travel-info/where-we-fly)
            - [ ] Check if any new destinations need to be added to `destinations.ts`
            - [ ] Verify no existing routes were unexpectedly removed
          labels: automated, schedules
          delete-branch: true
